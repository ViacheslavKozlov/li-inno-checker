name: Deploy

# Production deploy to Railway. Two ways in:
#   1. A GitHub Release is published (release-please does this when its release PR
#      is merged) -> deploy that release's tag. This is the normal path; merging
#      to main alone does NOT deploy.
#   2. Manual run with a `ref` (a vX.Y.Z tag) -> rebuild & deploy that exact
#      version. This is the rollback path — no cherry-picking required.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag/ref to deploy, e.g. v1.2.0 (used for rollback).'
        required: true

# Never run two production deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      # On a release event, deploy the release's tag; on a manual run, the input
      # ref. railway up uploads this checked-out source, so checking out an older
      # tag rebuilds that exact version via the Dockerfile builder (railway.json).
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        # RAILWAY_TOKEN is a project token scoped to the project + environment, so
        # the CLI knows where to deploy without `railway link`.
        #
        # --detach (not --ci): a project token can trigger a deploy but cannot
        # read build/deploy logs, so `railway up --ci` uploads fine then dies
        # with "Failed to retrieve build log" ~60s later and fails the job even
        # though the build is healthy. --detach uploads the source, kicks off the
        # build, and returns. Trade-off: a green job means "deploy triggered",
        # not "deploy succeeded" — confirm a release via the bot's /version or
        # the Railway dashboard. To restore failure gating, swap to an
        # account/team token that can read logs and put --ci back.
        run: railway up --detach --service "${{ vars.RAILWAY_SERVICE || 'li-inno-checker' }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
