name: Release Please

# Watches main and maintains a "release PR" that accumulates the next SemVer
# version + CHANGELOG from Conventional Commits. Merging that PR bumps
# package.json, updates CHANGELOG.md, tags the commit, and publishes a GitHub
# Release. Publishing that Release is what triggers the production deploy
# (.github/workflows/deploy.yml) — a plain push to main, including the release
# commit, does NOT deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

# Don't let two release-please runs race on the same release PR.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Cut releases on main, not the repo default branch (dev). Without
          # this the action targets the default branch, opening release PRs
          # against dev that never tag/publish — see CONTRIBUTING.md.
          target-branch: main
          # Manifest-driven config lives in release-please-config.json and
          # .release-please-manifest.json at the repo root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
