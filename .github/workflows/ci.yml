name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    name: Deploy to Railway
    needs: test
    # Only deploy real pushes to main — not PRs or other branches.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy
        # RAILWAY_TOKEN is a project token scoped to the project + environment,
        # so the CLI knows where to deploy without `railway link`. --ci streams
        # build/deploy logs then exits non-zero if the deploy fails.
        run: railway up --ci --service "${{ vars.RAILWAY_SERVICE || 'li-inno-checker' }}"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
