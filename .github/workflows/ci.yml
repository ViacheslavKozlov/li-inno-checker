name: CI

# Validation only — no deploy. Production deployment happens on a published
# release (see release-please.yml -> deploy.yml). Runs on PRs (into dev or main)
# and on pushes to the integration/release branches.
on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages
    # PRs only: lints the commits the PR adds. (The local Husky commit-msg hook
    # is the first line of defense; this catches anything that bypassed it.)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  test:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 26
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
